# Meepo Internet Oddities — nginx site config
# Install: sudo cp mio-web.nginx.conf /etc/nginx/sites-available/mio-web
#          sudo ln -s /etc/nginx/sites-available/mio-web /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# TLS (first time):  sudo certbot certonly --webroot -w /var/www/certbot -d meepo.online -d www.meepo.online
# TLS (renewal):     sudo certbot renew
# Auto-renewal:      systemd certbot.timer (enabled by default on Ubuntu)

server {
    listen 80;
    listen [::]:80;
    server_name meepo.online www.meepo.online;

    # Certbot ACME challenge — must be served over plain HTTP for domain validation.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name meepo.online www.meepo.online;

    # ── TLS (managed by certbot) ─────────────────────────
    # Certs issued via:  sudo certbot certonly --webroot -w /var/www/certbot -d meepo.online -d www.meepo.online
    # Renewed via:       sudo certbot renew  (runs automatically via systemd certbot.timer)
    ssl_certificate     /etc/letsencrypt/live/meepo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meepo.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Proxy to MIO backend ────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Health check (bypass proxy buffering) ───────────
    location = /api/health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        access_log off;
    }
}
