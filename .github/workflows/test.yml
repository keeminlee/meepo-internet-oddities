name: Test MIO

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: mio-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run --reporter=default
